<svg width="1200" height="220" viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg">
  <style>
    .mainText {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 74px;
      font-weight: 800;
      fill: #FFFFFF;
    }
    .subText {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 38px;
      font-weight: 700;
      fill: #39B54A;
      letter-spacing: 1px;
    }
  </style>

  <!-- MB Logo -->
  <text x="10" y="130" font-family="Arial Black, Arial, sans-serif" font-size="140" font-weight="900" fill="#FFFFFF">M</text>
  <text x="95" y="130" font-family="Arial Black, Arial, sans-serif" font-size="140" font-weight="900" fill="#39B54A">B</text>

  <!-- Divider -->
  <line x1="240" y1="30" x2="240" y2="180" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>

  <!-- Company Name -->
  <text x="290" y="95" class="mainText">MALIK BROTHERS</text>
  <text x="295" y="155" class="subText">PLASTIC RECYCLING SOLUTIONS</text>
</svg>
